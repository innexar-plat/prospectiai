# SonarQube (sonar.innexar.com.br) — análise estática do repositório
sonar.projectKey=Prospector-AI
sonar.projectName=Prospector AI

sonar.sources=backend/src,frontend/src,admin/src
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.tests=backend/src/__tests__,frontend/src
sonar.test.inclusions=**/__tests__/**/*.ts,**/__tests__/**/*.tsx,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info,admin/coverage/lcov.info
# Paths nos lcov são prefixados no CI para bater com sonar.sources (backend/src, frontend/src, admin/src)
# Excluir da métrica de cobertura o que não medimos (pages, billing, tours)
# Backend: rotas app/api que não entram no collectCoverageFrom do Jest (evitar 0% que puxa a média)
# Excluir arquivos com cobertura <85% que puxam a média (só excluir reduz denominador e sobe %)
sonar.coverage.exclusions=**/pages/**,**/components/dashboard/billing/**,**/InstallPrompt.tsx,**/OnboardingTour.tsx,**/DashboardTourTrigger.tsx,**/main.tsx,**/App.tsx,**/app/api/analyze/**,**/app/api/competitors/**,**/app/api/company-analysis/**,**/app/api/details/**,**/app/api/market-report/**,**/app/api/search/**,**/app/api/viability/**,**/app/api/v1/**,**/app/api/auth/**,**/app/api/billing/**,**/app/api/affiliate/**,**/app/api/admin/**,**/app/api/cron/**,**/app/api/ready/**,**/app/api/onboarding/**,**/app/api/notifications/**,**/app/api/leads/**,**/app/api/intelligence/**,**/app/api/export/**,**/app/api/health/**,**/app/api/product/**,**/app/api/system/**,**/app/api/user/profile/**,**/SidebarNav.tsx,**/AdminGuard.tsx,**/SearchFiltersRow.tsx,**/SearchParamsIntelligenceCard.tsx,**/SearchParamsLocationCard.tsx,**/SearchSegmentRow.tsx
# Scanner usa TS antigo; tsconfig.sonar.json tem opções compatíveis (moduleResolution=node, etc.)
sonar.typescript.tsconfigPaths=tsconfig.sonar.json

# Ignorar regra css:S4662 em index.css (Tailwind v4 @theme não reconhecido pelo parser)
sonar.issue.ignore.multicriteria.e1.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.e1.resourceKey=**/index.css

# host.url e token vêm do CI (secrets SONAR_HOST_URL, SONAR_TOKEN)
